<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="resultados">
    <div th:if="${not #lists.isEmpty(atividades)}" id="conteudo-atividades" class="row row-cols-1 row-cols-md-2 row-cols-lg-4 g-4">
        
        <div class="col d-flex" th:each="atividade, stat : ${atividades}">
            <div class="card w-100 h-100 d-flex flex-column atividade-card">
                
                <div class="card-img-container">
                    <img th:src="${atividade.urlImagem}" class="card-img-top" alt="Banner da atividade" 
                         onerror="this.onerror=null; this.src='https://via.placeholder.com/400x180/6c757d/ffffff?text=Sem+Imagem'">
                </div>
                
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title mb-2 titulo-atividade" th:text="${atividade.nome}"></h5>
                    
                    <div class="descricao-container flex-grow-1 mb-2">
                        <p class="card-text descricao-text mb-1" th:id="'desc-text-' + ${stat.index}" th:attr="data-fulltext=${atividade.descricao}">
                            <span th:text="${#strings.length(atividade.descricao) > 120 ? #strings.substring(atividade.descricao, 0, 120) + '...' : atividade.descricao}"></span>
                        </p>
                        
                        <div th:if="${#strings.length(atividade.descricao) > 120}" class="text-end">
                            <small>
                                <a href="#" class="btn-ler-mais text-primary text-decoration-none" 
                                   th:attr="data-atividade-id=${atividade.id}"
                                   th:data-atividade-nome="${atividade.nome}"
                                   th:data-atividade-descricao="${atividade.descricao}"
                                   th:data-atividade-categoria="${atividade.categoria}"
                                   th:data-atividade-etapa="${atividade.etapaEducacional}"
                                   th:data-atividade-link="${atividade.link}"
                                   th:data-atividade-imagem="${atividade.urlImagem}">
                                    Ler mais
                                </a>
                            </small>
                        </div>
                    </div>
                </div>
                
                <ul class="list-group list-group-flush mt-auto">
                    <li class="list-group-item py-2">
                        <div class="d-flex justify-content-between align-items-center">
                            <small class="text-muted">Categoria:</small>
                            <span class="badge bg-light text-dark" th:text="${atividade.categoria}"></span>
                        </div>
                    </li>
                    
                    <li class="list-group-item py-2">
                        <div class="d-flex justify-content-between align-items-center">
                            <small class="text-muted">Etapa:</small>
                            <span class="etapa-badge" th:text="${atividade.etapaEducacional}"
                                  th:classappend="'etapa-' + ${#strings.replace(#strings.replace(#strings.toLowerCase(atividade.etapaEducacional), 'é', 'e'), 'ã', 'a')}">
                            </span>
                        </div>
                    </li>
                    
                    <li class="list-group-item py-2">
                        <div>
                            <small class="text-muted d-block mb-1">Habilidades BNCC:</small>
                            <div class="habilidades-container">
                                <div th:each="habilidade : ${atividade.habilidadesBncc}">
                                    <span class="habilidade-tag d-inline-block mb-1 me-1"
                                          th:classappend="${habilidade.etapaClasse}"
                                          th:text="${habilidade.codigoHabilidade}"
                                          th:title="${habilidade.descricao}">
                                    </span>
                                </div>
                            </div>
                        </div>
                    </li>
                </ul>
                
                <div class="card-footer mt-auto pt-3">
                    <a th:href="${atividade.link}" class="btn btn-primary w-100" target="_blank" rel="noopener noreferrer">
                        Acessar Atividade
                    </a>
                </div>
            </div>
        </div>
    </div>
    
    <div th:if="${#lists.isEmpty(atividades)}" class="text-center py-5">
        <div class="mb-3">
            <i class="bi bi-search display-1 text-muted"></i>
        </div>
        <h4 class="text-muted mb-3">Nenhuma atividade encontrada</h4>
    </div>
</div>

</body>
</html>
