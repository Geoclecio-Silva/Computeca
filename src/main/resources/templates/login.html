<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/base}">
<head>
    <title>Login Administrativo</title>
</head>
<body>

    <div layout:fragment="conteudo" class="d-flex justify-content-center align-items-center" style="min-height: 70vh;">
        <div class="card p-4 shadow" style="max-width: 400px; width: 100%;">
            
            <div th:if="${param.error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <i class="bi bi-exclamation-triangle-fill me-2"></i>
                Email ou senha inválidos.
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            
            <div th:if="${param.logout}" class="alert alert-success alert-dismissible fade show" role="alert">
                <i class="bi bi-check-circle-fill me-2"></i>
                Você foi desconectado com sucesso.
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            
            <div th:if="${param.registered}" class="alert alert-info alert-dismissible fade show" role="alert">
                <i class="bi bi-info-circle-fill me-2"></i>
                Cadastro realizado com sucesso! Faça login para continuar.
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            
            <h2 class="text-center mb-4">
                <i class="bi bi-shield-lock-fill text-primary me-2"></i>
                Login Administrativo
            </h2>
            
            <form th:action="@{/login}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                
                <div class="mb-3">
                    <label for="username" class="form-label fw-bold">
                        <i class="bi bi-envelope-fill me-2"></i>Email
                    </label>
                    <input type="email" 
                           id="username" 
                           name="username" 
                           class="form-control form-control-lg" 
                           placeholder="seu@email.com"
                           required 
                           autofocus>
                    <small class="text-muted">Use o email cadastrado</small>
                </div>
                
                <div class="mb-3">
                    <label for="password" class="form-label fw-bold">
                        <i class="bi bi-key-fill me-2"></i>Senha
                    </label>
                    <input type="password" 
                           id="password" 
                           name="password" 
                           class="form-control form-control-lg" 
                           placeholder="••••••••"
                           required>
                </div>
                
                <div class="d-grid gap-2 mt-4">
                    <button type="submit" class="btn btn-primary btn-lg">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
                    </button>
                </div>
            </form>
            
            <!-- Link de cadastro DENTRO do card -->
            <div class="text-center mt-4 pt-3 border-top">
                <p class="mb-0">
                    Não tem uma conta? 
                    <a th:href="@{/registro}" class="text-primary fw-bold text-decoration-none">
                        Cadastre-se aqui
                    </a>
                </p>
            </div>
            
            <div class="text-center mt-3">
                <small class="text-muted">
                    Área restrita para administradores, curadores e colaboradores.
                </small>
            </div>
        </div>
    </div>

</body>
</html>
