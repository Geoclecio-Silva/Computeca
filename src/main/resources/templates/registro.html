<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/base}">
<head>
    <title>Cadastro de Usuário</title>
</head>
<body>

<div layout:fragment="conteudo" class="d-flex justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="card p-4 shadow" style="max-width: 500px; width: 100%;">
        
        <div th:if="${sucesso}" class="alert alert-success" role="alert">
            <span th:text="${sucesso}"></span>
        </div>
        
        <div th:if="${erro}" class="alert alert-danger" role="alert">
            <span th:text="${erro}"></span>
        </div>
        
        <h2 class="text-center mb-4">
            <i class="bi bi-person-plus-fill text-primary me-2"></i>
            Criar Conta
        </h2>
        
        <form th:action="@{/registro}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            
            <div class="mb-3">
                <label for="nome" class="form-label fw-bold">Nome Completo</label>
                <input type="text" 
                       id="nome" 
                       name="nome" 
                       class="form-control form-control-lg" 
                       placeholder="Seu nome"
                       required 
                       autofocus>
            </div>
            
            <div class="mb-3">
                <label for="email" class="form-label fw-bold">Email</label>
                <input type="email" 
                       id="email" 
                       name="email" 
                       class="form-control form-control-lg" 
                       placeholder="seu@email.com"
                       required>
            </div>
            
            <div class="mb-3">
                <label for="password" class="form-label fw-bold">Senha</label>
                <input type="password" 
                       id="password" 
                       name="password" 
                       class="form-control form-control-lg" 
                       placeholder="••••••••"
                       required>
                <small class="text-muted">Mínimo 6 caracteres</small>
            </div>
            
            <div class="d-grid gap-2 mt-4">
                <button type="submit" class="btn btn-primary btn-lg">
                    <i class="bi bi-check-circle me-2"></i>Cadastrar
                </button>
            </div>
        </form>
        
        <div class="text-center mt-4">
            <p>Já tem uma conta? <a th:href="@{/login}">Faça login</a></p>
        </div>
    </div>
</div>

</body>
</html>
