<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" layout:decorate="~{layouts/base}">
<head>
    <title>Gerenciar Usuários - Admin</title>
</head>
<body>
<div layout:fragment="conteudo">
    <div class="container mt-4">
        <h2 class="mb-4">Gerenciar Usuários</h2>
        
        <!-- Mensagens de feedback -->
        <div th:if="${sucesso}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${sucesso}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        
        <div th:if="${erro}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${erro}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        
        <!-- Tabela de usuários -->
        <div class="table-responsive">
            <table class="table table-striped table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Nome</th>
                        <th>Email</th>
                        <th>Papéis</th>
                        <th>Status</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="usuario : ${usuarios}">
                        <td th:text="${usuario.id}"></td>
                        <td th:text="${usuario.nome}"></td>
                        <td th:text="${usuario.email}"></td>
                        <td>
                            <span th:each="role : ${usuario.roles}" 
                                  class="badge bg-primary me-1"
                                  th:text="${role.name.replace('ROLE_', '')}">
                            </span>
                        </td>
                        <td>
                            <span th:if="${usuario.active}" 
                                  class="badge bg-success">Ativo</span>
                            <span th:unless="${usuario.active}" 
                                  class="badge bg-danger">Inativo</span>
                        </td>
                        <td>
                            <!-- Botões de promoção (só para ADMIN) -->
                            <div class="btn-group btn-group-sm" role="group">
                                <!-- Promover para COLABORADOR -->
                                <form th:if="${!usuario.hasRole('ROLE_COLABORADOR')}" 
                                      th:action="@{/admin/usuarios/promover/{id}(id=${usuario.id})}" 
                                      method="post" 
                                      style="display: inline;">
                                    <input type="hidden" name="role" value="ROLE_COLABORADOR">
                                    <button type="submit" class="btn btn-outline-success" 
                                            title="Promover a Colaborador">
                                        <i class="bi bi-arrow-up-circle"></i> Colab
                                    </button>
                                </form>
                                
                                <!-- Promover para CURADOR -->
                                <form th:if="${usuario.hasRole('ROLE_COLABORADOR') and !usuario.hasRole('ROLE_CURADOR')}" 
                                      th:action="@{/admin/usuarios/promover/{id}(id=${usuario.id})}" 
                                      method="post" 
                                      style="display: inline;">
                                    <input type="hidden" name="role" value="ROLE_CURADOR">
                                    <button type="submit" class="btn btn-outline-warning" 
                                            title="Promover a Curador">
                                        <i class="bi bi-star"></i> Curador
                                    </button>
                                </form>
                                
                                <!-- Remover role -->
                                <form th:if="${usuario.hasRole('ROLE_COLABORADOR')}" 
                                      th:action="@{/admin/usuarios/rebaixar/{id}(id=${usuario.id})}" 
                                      method="post" 
                                      style="display: inline;">
                                    <input type="hidden" name="role" value="ROLE_COLABORADOR">
                                    <button type="submit" class="btn btn-outline-danger" 
                                            title="Remover Colaborador">
                                        <i class="bi bi-arrow-down-circle"></i>
                                    </button>
                                </form>
                                
                                <!-- Desativar usuário (mantido do original) -->
                                <form th:action="@{/admin/usuarios/desativar/{id}(id=${usuario.id})}" 
                                      method="post" 
                                      style="display: inline;"
                                      onsubmit="return confirm('Tem certeza que deseja desativar este usuário?');">
                                    <button type="submit" class="btn btn-outline-secondary" 
                                            title="Desativar usuário">
                                        <i class="bi bi-person-x"></i>
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        
        <!-- Se não houver usuários -->
        <div th:if="${usuarios == null or usuarios.isEmpty()}" class="alert alert-info">
            Nenhum usuário cadastrado.
        </div>
    </div>
</div>
</body>
</html>
